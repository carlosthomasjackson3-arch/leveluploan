<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelUp Loan</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f5f7fb;
  margin:0;
}

.container {
  max-width:700px;
  margin:40px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h1 { margin-top:0 }

button {
  padding:12px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

button:disabled {
  opacity:0.5;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
}

.page { display:none }
.page.active { display:block }

.warning { color:#b91c1c }
.success { color:#166534 }

</style>
</head>

<body>

<div class="container">

<!-- APPLY -->
<div id="apply" class="page active">
<h1>Apply</h1>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="income" placeholder="Monthly Income">
<textarea id="reason" placeholder="Why do you need the loan?"></textarea>

<button onclick="goTraining()">Continue</button>
</div>

<!-- TRAINING -->
<div id="training" class="page">
<h1>Training</h1>

<p>Which is smarter?</p>

<button onclick="answerTraining(true)">Borrow only what you need</button>
<button onclick="answerTraining(false)">Borrow max amount</button>

<textarea id="recall" placeholder="What did you learn?"></textarea>

<button onclick="goAgreement()">Continue</button>
</div>

<!-- AGREEMENT -->
<div id="agreement" class="page">
<h1>Agreement</h1>

<textarea id="miss" placeholder="What happens if you miss a payment?"></textarea>
<textarea id="free" placeholder="Is this free money?"></textarea>

<input id="sign" placeholder="Type full name">

<label>
<input type="checkbox" id="agree"> I agree
</label>

<button onclick="goVerify()">Continue</button>
</div>

<!-- VERIFY -->
<div id="verify" class="page">
<h1>Verification</h1>

<input id="vname" placeholder="Full legal name">
<input id="dob" placeholder="DOB">
<input id="address" placeholder="Address">

<textarea id="security" placeholder="Explain your plan"></textarea>
<textarea id="fraud" placeholder="Why honesty matters?"></textarea>

<button onclick="goReview()">Continue</button>
</div>

<!-- REVIEW -->
<div id="review" class="page">
<h1>LevelUp Review</h1>

<p id="summary"></p>

<button id="sendBtn" onclick="sendProfile()">LevelUp Review</button>

<p class="success" id="done" style="display:none;">Profile sent. Opening form...</p>
</div>

</div>

<script>

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeYbQBel6dYNZ9R3TLsC9J-n2bgmIYOPIt6BUL_QLZTNozWWA/viewform";

const KEY = "99b147a3-bd45-4a43-9add-41beb9a4901e";

let score = 40;
let fraudFlag = false;

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goTraining(){
  if(!name.value || !email.value || !phone.value || !income.value){
    alert("Fill everything");
    return;
  }
  show("training");
}

function answerTraining(correct){
  if(correct){
    score+=15;
    alert("Good choice");
  } else {
    alert("Wrong answer");
  }
}

function goAgreement(){
  if(!recall.value){
    alert("Answer recall");
    return;
  }
  score+=10;
  show("agreement");
}

function goVerify(){
  if(!miss.value || !free.value || !sign.value || !agree.checked){
    alert("Complete agreement");
    return;
  }

  if(free.value.toLowerCase().includes("yes")) fraudFlag=true;

  score+=10;
  show("verify");
}

function goReview(){
  if(!vname.value || !dob.value || !address.value || !security.value || !fraud.value){
    alert("Complete verification");
    return;
  }

  if(fraud.value.toLowerCase().includes("lie")) fraudFlag=true;

  score+=10;

  let summaryText = "Moderate profile";

  if(score>80) summaryText="Strong profile";
  if(score<60) summaryText="Weak profile";

  if(fraudFlag) summaryText += " ⚠️ FRAUD FLAG";

  document.getElementById("summary").innerText =
    "Score: "+score+" | "+summaryText;

  show("review");
}

async function sendProfile(){

  let profile = `
RISK ASSESSMENT PROFILE

Name: ${name.value}
Email: ${email.value}
Phone: ${phone.value}
Income: ${income.value}

Score: ${score}

Reason:
${reason.value}

Miss Payment:
${miss.value}

Free Money:
${free.value}

Verification:
${vname.value} | ${dob.value} | ${address.value}

Security:
${security.value}

Fraud:
${fraud.value}

FLAG: ${fraudFlag ? "YES" : "NO"}
`;

  document.getElementById("sendBtn").disabled=true;

  await fetch("https://api.web3forms.com/submit", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      access_key: KEY,
      subject:"Risk Assessment Profile - "+name.value,
      message: profile
    })
  });

  document.getElementById("done").style.display="block";

  setTimeout(()=>{
    window.open(FORM_URL,"_blank");
  },1000);
}

</script>

</body>
</html>
